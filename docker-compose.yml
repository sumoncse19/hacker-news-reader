services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hn_reader
      POSTGRES_USER: hn_user
      POSTGRES_PASSWORD: hn_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hn_user -d hn_reader"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://hn_user:hn_password@postgres:5432/hn_reader
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm start"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
